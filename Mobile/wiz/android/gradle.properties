# ✅ REALISTIC MEMORY SETTINGS (4GB total)
# This should work on most computers
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError -XX:+UseG1GC
android.useAndroidX=true
android.enableJetifier=true
android.enableR8.fullMode=false

# Improve build performance
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# Kotlin compiler options (prevent OOM)
kotlin.daemon.jvmargs=-Xmx2g -XX:+UseParallelGC
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'wiz-car-rental-production'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - '10.104.0.2:9100'   
          - '10.104.0.5:9100'   
          - '10.104.0.6:9100'   
        labels:
          job: 'node-exporter'

  - job_name: 'cadvisor'
    dns_sd_configs:
      - names: ['tasks.cadvisor']
        type: 'A'
        port: 8080
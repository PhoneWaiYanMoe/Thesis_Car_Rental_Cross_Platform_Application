global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'wiz-car-rental-production'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    dns_sd_configs:
      - names: ['tasks.node-exporter']
        type: 'A'
        port: 9100

  - job_name: 'cadvisor'
    dns_sd_configs:
      - names: ['tasks.cadvisor']
        type: 'A'
        port: 8080

  - job_name: 'user-service'
    dns_sd_configs:
      - names: ['tasks.user-service']
        type: 'A'
        port: 3001
    metrics_path: '/metrics'

  - job_name: 'vehicle-service'
    dns_sd_configs:
      - names: ['tasks.vehicle-service']
        type: 'A'
        port: 3002
    metrics_path: '/metrics'

  - job_name: 'location-service'
    dns_sd_configs:
      - names: ['tasks.location-service']
        type: 'A'
        port: 3003
    metrics_path: '/metrics'

  - job_name: 'booking-service'
    dns_sd_configs:
      - names: ['tasks.booking-service']
        type: 'A'
        port: 3004
    metrics_path: '/metrics'

  - job_name: 'review-service'
    dns_sd_configs:
      - names: ['tasks.review-service']
        type: 'A'
        port: 3005
    metrics_path: '/metrics'

  - job_name: 'payment-service'
    dns_sd_configs:
      - names: ['tasks.payment-service']
        type: 'A'
        port: 3006
    metrics_path: '/metrics'

  - job_name: 'notification-service'
    dns_sd_configs:
      - names: ['tasks.notification-service']
        type: 'A'
        port: 3007
    metrics_path: '/metrics'

  - job_name: 'media-service'
    dns_sd_configs:
      - names: ['tasks.media-service']
        type: 'A'
        port: 3008
    metrics_path: '/metrics'

  - job_name: 'request-service'
    dns_sd_configs:
      - names: ['tasks.request-service']
        type: 'A'
        port: 3010
    metrics_path: '/metrics'

  - job_name: 'rabbitmq'
    dns_sd_configs:
      - names: ['tasks.rabbitmq']
        type: 'A'
        port: 15672
    metrics_path: '/api/metrics'
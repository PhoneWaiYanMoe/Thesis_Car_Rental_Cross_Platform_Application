input {
  beats {
    port => 5044
  }
}

filter {
  # Parse JSON logs if they exist
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "json_data"
    }
  }

  # Extract container information
  if [container][name] {
    mutate {
      add_field => {
        "service_name" => "%{[container][name]}"
      }
    }
  }

  # Parse timestamp
  if [json_data][timestamp] {
    date {
      match => [ "[json_data][timestamp]", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Add log level
  if [json_data][level] {
    mutate {
      add_field => {
        "log_level" => "%{[json_data][level]}"
      }
    }
  } else {
    # Try to detect log level from message
    if [message] =~ /(?i)error/ {
      mutate { add_field => { "log_level" => "ERROR" } }
    } else if [message] =~ /(?i)warn/ {
      mutate { add_field => { "log_level" => "WARN" } }
    } else if [message] =~ /(?i)info/ {
      mutate { add_field => { "log_level" => "INFO" } }
    } else if [message] =~ /(?i)debug/ {
      mutate { add_field => { "log_level" => "DEBUG" } }
    } else {
      mutate { add_field => { "log_level" => "UNKNOWN" } }
    }
  }

  # Extract service type from container name
  if [service_name] =~ /user-service/ {
    mutate { add_field => { "service_type" => "user-service" } }
  } else if [service_name] =~ /vehicle-service/ {
    mutate { add_field => { "service_type" => "vehicle-service" } }
  } else if [service_name] =~ /booking-service/ {
    mutate { add_field => { "service_type" => "booking-service" } }
  } else if [service_name] =~ /payment-service/ {
    mutate { add_field => { "service_type" => "payment-service" } }
  } else if [service_name] =~ /review-service/ {
    mutate { add_field => { "service_type" => "review-service" } }
  } else if [service_name] =~ /location-service/ {
    mutate { add_field => { "service_type" => "location-service" } }
  } else if [service_name] =~ /notification-service/ {
    mutate { add_field => { "service_type" => "notification-service" } }
  } else if [service_name] =~ /media-service/ {
    mutate { add_field => { "service_type" => "media-service" } }
  } else if [service_name] =~ /request-service/ {
    mutate { add_field => { "service_type" => "request-service" } }
  } else if [service_name] =~ /analytics-service/ {
    mutate { add_field => { "service_type" => "analytics-service" } }
  } else if [service_name] =~ /nginx/ {
    mutate { add_field => { "service_type" => "nginx" } }
  } else if [service_name] =~ /rabbitmq/ {
    mutate { add_field => { "service_type" => "rabbitmq" } }
  } else if [service_name] =~ /redis/ {
    mutate { add_field => { "service_type" => "redis" } }
  } else {
    mutate { add_field => { "service_type" => "unknown" } }
  }

  # Remove unnecessary fields to reduce storage
  mutate {
    remove_field => ["agent", "ecs", "input", "log"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elk_elasticsearch:9200"] 
    index => "wiz-logs-%{+YYYY.MM.dd}"
    manage_template => true
    template_name => "wiz-logs"
  }
}
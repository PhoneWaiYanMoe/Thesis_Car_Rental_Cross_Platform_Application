version: "3.8"

# =====================================================================
# PRODUCTION-READY ELK STACK for Docker Swarm
# Deploy with: docker stack deploy -c elk-stack.yml elk
# =====================================================================

services:
  # ==================== ELASTICSEARCH ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - cluster.name=wiz-elk-cluster
      - network.host=0.0.0.0
      - http.host=0.0.0.0
      - transport.host=127.0.0.1
      - bootstrap.memory_lock=true
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - wiz-network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ==================== KIBANA ====================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elk_elasticsearch:9200
      - ELASTICSEARCH_URL=http://elk_elasticsearch:9200
      - SERVER_NAME=wiz-kibana
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5601
      - SERVER_BASEPATH=/kibana
      - SERVER_REWRITEBASEPATH=true
      - SERVER_PUBLICBASEURL=http://206.189.147.242/kibana
      - LOGGING_VERBOSE=true
      - XPACK_SECURITY_ENABLED=false
      - XPACK_MONITORING_UI_CONTAINER_ELASTICSEARCH_ENABLED=false
      - NODE_OPTIONS=--max-old-space-size=400
    networks:
      - wiz-network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 5
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/kibana/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  # ==================== LOGSTASH ====================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    environment:
      - XPACK_MONITORING_ENABLED=false
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - LOG_LEVEL=info
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=9600
      - QUEUE_TYPE=memory
      - QUEUE_MAX_BYTES=256mb
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - logstash_data:/usr/share/logstash/data
    configs:
      - source: logstash_pipeline
        target: /usr/share/logstash/pipeline/logstash.conf
    networks:
      - wiz-network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 5
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== FILEBEAT ====================
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    user: root
    command: filebeat -e -strict.perms=false
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat_data:/usr/share/filebeat/data
    configs:
      - source: filebeat_config
        target: /usr/share/filebeat/filebeat.yml
    networks:
      - wiz-network
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

configs:
  filebeat_config:
    file: ./filebeat/filebeat.yml
  logstash_pipeline:
    file: ./logstash/pipeline/logstash.conf

volumes:
  elasticsearch_data:
    driver: local
  filebeat_data:
    driver: local
  logstash_data:
    driver: local

networks:
  wiz-network:
    name: wiz_wiz-network
    external: true
filebeat.inputs:
  - type: container
    enabled: true
    paths:
      - '/var/lib/docker/containers/*/*.log'
    
    # Parse Docker JSON logs
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: log
    
    # Processors to enrich data
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      
      - decode_json_fields:
          fields: ["message"]
          target: "json"
          overwrite_keys: true
          add_error_key: true
      
      - add_fields:
          target: ''
          fields:
            environment: production
            cluster: wiz-car-rental

      # Drop logs from ELK services to avoid circular logging
      - drop_event:
          when:
            or:
              - contains:
                  container.name: "elk_"
              - contains:
                  container.name: "filebeat"
              - contains:
                  container.name: "elasticsearch"
              - contains:
                  container.name: "kibana"

      # Parse common log patterns
      - dissect:
          when:
            has_fields: ['message']
          tokenizer: "%{timestamp} %{+timestamp} [%{log.level}] %{message}"
          field: "message"
          target_prefix: "dissect"
          ignore_failure: true

# Output directly to Elasticsearch (no Logstash needed)
output.elasticsearch:
  hosts: ["elk_elasticsearch:9200"]
  index: "wiz-logs-%{+yyyy.MM.dd}"
  
  # Index lifecycle settings
  ilm.enabled: false
  
  # Connection settings
  timeout: 90
  max_retries: 3
  backoff.init: 1s
  backoff.max: 60s

# Setup index template
setup.template.name: "wiz-logs"
setup.template.pattern: "wiz-logs-*"
setup.template.enabled: true
setup.template.overwrite: false
setup.template.settings:
  index.number_of_shards: 1
  index.number_of_replicas: 0

# Kibana endpoint for dashboards
setup.kibana:
  host: "elk_kibana:5601"

# Logging
logging.level: info
logging.to_files: true
logging.files:
  path: /usr/share/filebeat/logs
  name: filebeat
  keepfiles: 7
  permissions: 0644

# Disable monitoring
monitoring.enabled: false
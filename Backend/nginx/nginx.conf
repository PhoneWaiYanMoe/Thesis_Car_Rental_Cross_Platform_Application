worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    send_timeout 60s;
    client_body_timeout 30s;
    client_header_timeout 10s;
    keepalive_timeout 75s;

    client_max_body_size 20M;
    client_body_buffer_size 128k;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1024;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ==================== MONITORING ====================

        location /grafana/ {
            set $upstream monitoring_grafana:3000;
            proxy_pass http://$upstream;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
        }

        location /prometheus/ {
            set $upstream monitoring_prometheus:9090;
            rewrite ^/prometheus/(.*)$ /$1 break;
            proxy_pass http://$upstream;
        }

        location /kibana/ {
            set $upstream elk_kibana:5601;
            proxy_pass http://$upstream;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
        }

        location /elasticsearch/ {
            set $upstream elk_elasticsearch:9200;
            proxy_pass http://$upstream;
        }

        location /alertmanager/ {
            set $upstream monitoring_alertmanager:9093;
            rewrite ^/alertmanager/(.*)$ /$1 break;
            proxy_pass http://$upstream;
        }

        location /visualizer/ {
            set $upstream visualizer_visualizer:8080;
            proxy_pass http://$upstream;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
        }

        # ==================== APPLICATION ====================

        location /auth {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
            if ($request_method = 'OPTIONS') { return 204; }
            set $upstream wiz_user-service:3001;
            proxy_pass http://$upstream;
        }

        location /users {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
            if ($request_method = 'OPTIONS') { return 204; }
            set $upstream wiz_user-service:3001;
            proxy_pass http://$upstream;
        }

        location /profile {

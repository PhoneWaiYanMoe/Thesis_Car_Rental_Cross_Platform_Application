            rewrite ^/api/analytics/(.*)$ /analytics/$1 break;
            proxy_pass http://$upstream;
        }

        location /api/v1/requests {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
            if ($request_method = 'OPTIONS') { return 204; }
            set $upstream wiz_request-service:3010;
            rewrite ^/api/v1/requests(.*) /requests$1 break;
            proxy_pass http://$upstream;
        }

        # ==================== CHAT (WebSocket) ====================
        location /chat {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
            if ($request_method = 'OPTIONS') { return 204; }
            set $upstream wiz_chat-service:3011;
            proxy_pass http://$upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ==================== SYSTEM ====================

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location = / {
            return 200 '{"status":"ok","service":"Wiz Car Rental API Gateway","version":"1.0.0"}';
            add_header Content-Type application/json;
        }

        location / {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
            if ($request_method = 'OPTIONS') { return 204; }
            return 404 '{"error":"Not Found","message":"The requested endpoint does not exist"}';
            add_header Content-Type application/json;
        }

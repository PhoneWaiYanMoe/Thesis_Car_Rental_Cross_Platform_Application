worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # DNS resolver for Docker Swarm (internal DNS)
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ==================== TIMEOUTS ====================
    proxy_connect_timeout 10s;    # reduced from 300s — fail fast on dead upstream
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    send_timeout 60s;
    client_body_timeout 30s;
    client_header_timeout 10s;
    keepalive_timeout 75s;        # client keepalive

    # ==================== BUFFERS ====================
    client_max_body_size 20M;
    client_body_buffer_size 128k;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    # ==================== PERFORMANCE ====================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1024;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ==================== UPSTREAM POOLS ====================
    # keepalive = persistent connections to upstreams — this is the key fix for 502s on rapid requests
    # Docker Swarm VIP load-balances across replicas automatically

    upstream user_service {
        server wiz_user-service:3001;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_time 1m;
    }

    upstream location_service {
        server wiz_location-service:3003;
        keepalive 16;
        keepalive_requests 1000;
        keepalive_time 1m;
    }

    upstream vehicle_service {
        server wiz_vehicle-service:3002;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_time 1m;
    }

    upstream booking_service {
        server wiz_booking-service:3004;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_time 1m;
    }

    upstream review_service {
        server wiz_review-service:3005;
        keepalive 16;
        keepalive_requests 1000;
        keepalive_time 1m;
    }

    upstream payment_service {
        server wiz_payment-service:3006;
        keepalive 16;
        keepalive_requests 1000;
        keepalive_time 1m;
    }

    upstream notification_service {
        server wiz_notification-service:3007;
        keepalive 8;
        keepalive_requests 500;
        keepalive_time 1m;
    }

    upstream media_service {
        server wiz_media-service:3008;
        keepalive 16;
        keepalive_requests 500;
        keepalive_time 1m;
    }

    upstream analytics_service {
        server wiz_analytics-service:3009;
        keepalive 8;
        keepalive_requests 500;
        keepalive_time 1m;
    }

    upstream request_service {
        server wiz_request-service:3010;
        keepalive 8;
        keepalive_requests 500;
        keepalive_time 1m;
    }

    upstream chat_service {
        server wiz_chat-service:3011;
        keepalive 16;
        keepalive_requests 1000;
        keepalive_time 5m;
    }

    upstream grafana {
        server monitoring_grafana:3000;
        keepalive 4;
    }

    upstream prometheus {
        server monitoring_prometheus:9090;
        keepalive 4;
    }

    upstream kibana {
        server elk_kibana:5601;
        keepalive 4;
    }

    upstream elasticsearch {
        server elk_elasticsearch:9200;
        keepalive 4;
    }

    upstream alertmanager {
        server monitoring_alertmanager:9093;
        keepalive 4;
    }

    upstream visualizer {
        server visualizer_visualizer:8080;
        keepalive 4;
    }

    server {
        listen 80;
        server_name _;

        # Common proxy headers — use HTTP/1.1 + Connection "" for keepalive to upstreams
        proxy_http_version 1.1;
        proxy_set_header Connection "";          # clears "close" so keepalive works
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ==================== MONITORING ====================

        location /grafana/ {
            proxy_pass http://grafana;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
        }

        location /prometheus/ {
            rewrite ^/prometheus/(.*)$ /$1 break;
            proxy_pass http://prometheus;
        }

        location /kibana/ {
            proxy_pass http://kibana;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
        }

        location /elasticsearch/ {
            proxy_pass http://elasticsearch/;
        }

        location /alertmanager/ {
            rewrite ^/alertmanager/(.*)$ /$1 break;
            proxy_pass http://alertmanager;
        }

        location /visualizer/ {
            proxy_pass http://visualizer;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
        }

        # ==================== APPLICATION ====================

        location /auth {
            proxy_pass http://user_service;
        }

        location /users {
            proxy_pass http://user_service;
        }

        location /profile {
            proxy_pass http://user_service;
        }

        location /api/customer-support {
            proxy_pass http://user_service;
        }

        location /api/favorites {
            proxy_pass http://user_service;
        }

        location /locations {
            proxy_pass http://location_service;
        }

        location /vehicles {
            proxy_pass http://vehicle_service;
        }

        location /bookings {
            proxy_pass http://booking_service;
        }

        location /reviews {
            proxy_pass http://review_service;
        }

        location /payment {
            proxy_pass http://payment_service;
        }

        location /payments {
            proxy_pass http://payment_service;
        }

        location /notifications {
            proxy_pass http://notification_service;
        }

        location /media {
            proxy_pass http://media_service;
        }

        location /api/analytics {
            proxy_pass http://analytics_service;
        }

        location /api/v1/requests {
            proxy_pass http://request_service;
        }

        # ==================== CHAT (WebSocket) ====================
        location /chat {
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;   # long timeout for WebSocket
            proxy_send_timeout 3600s;
        }

        # ==================== SYSTEM ====================

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location = / {
            return 200 '{"status":"ok","service":"Wiz Car Rental API Gateway","version":"1.0.0"}';
            add_header Content-Type application/json;
        }

        location / {
            return 404 '{"error":"Not Found","message":"The requested endpoint does not exist"}';
            add_header Content-Type application/json;
        }
    }
}
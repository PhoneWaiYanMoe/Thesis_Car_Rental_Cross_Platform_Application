events {
    worker_connections 2048;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Timeouts
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;
    client_body_timeout 300s;
    client_header_timeout 300s;

    # Buffer sizes
    client_max_body_size 20M;
    client_body_buffer_size 128k;

    # DNS resolver for Docker Swarm - CRITICAL for dynamic resolution
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name _;

        # Common proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ==================== MONITORING ENDPOINTS ====================
        
        # Grafana - Monitoring Dashboard
        location /grafana/ {
            set $grafana monitoring_grafana:3000;
            proxy_pass http://$grafana/;
            
            # WebSocket support for live updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Additional Grafana-specific headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Prometheus - Metrics Database
        location /prometheus/ {
            set $prometheus monitoring_prometheus:9090;
            proxy_pass http://$prometheus/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Kibana - Log Viewer
        location /kibana/ {
            set $kibana elk_kibana:5601;
            proxy_pass http://$kibana/;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Kibana needs higher buffer sizes
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Elasticsearch - Direct API access (optional, use with caution)
        location /elasticsearch/ {
            set $elasticsearch elk_elasticsearch:9200;
            proxy_pass http://$elasticsearch/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Alertmanager - Alert Management
        location /alertmanager/ {
            set $alertmanager monitoring_alertmanager:9093;
            proxy_pass http://$alertmanager/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # cAdvisor - Container Metrics
        location /cadvisor/ {
            set $cadvisor monitoring_cadvisor:8080;
            proxy_pass http://$cadvisor/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ==================== APPLICATION ENDPOINTS ====================

        # User Service Routes (Auth, Users, Profile)
        location /auth {
            set $user_service wiz_user-service:3001;
            proxy_pass http://$user_service;
        }

        location /users {
            set $user_service wiz_user-service:3001;
            proxy_pass http://$user_service;
        }

        location /profile {
            set $user_service wiz_user-service:3001;
            proxy_pass http://$user_service;
        }

        location /api/customer-support {
            set $user_service wiz_user-service:3001;
            proxy_pass http://$user_service;
        }

        location /api/favorites {
            set $user_service wiz_user-service:3001;
            proxy_pass http://$user_service;
        }

        # Location Service Routes
        location /locations {
            set $location_service wiz_location-service:3003;
            proxy_pass http://$location_service;
        }

        # Vehicle Service Routes
        location /vehicles {
            set $vehicle_service wiz_vehicle-service:3002;
            proxy_pass http://$vehicle_service;
        }

        # Booking Service Routes
        location /bookings {
            set $booking_service wiz_booking-service:3004;
            proxy_pass http://$booking_service;
        }

        # Review Service Routes
        location /reviews {
            set $review_service wiz_review-service:3005;
            proxy_pass http://$review_service;
        }

        # Payment Service Routes
        location /payment {
            set $payment_service wiz_payment-service:3006;
            proxy_pass http://$payment_service;
        }

        location /payments {
            set $payment_service wiz_payment-service:3006;
            proxy_pass http://$payment_service;
        }

        # Notification Service Routes
        location /notifications {
            set $notification_service wiz_notification-service:3007;
            proxy_pass http://$notification_service;
        }

        # Media Service Routes
        location /media {
            set $media_service wiz_media-service:3008;
            proxy_pass http://$media_service;
        }

        # Analytics Service Routes
        location /api/analytics {
            set $analytics_service wiz_analytics-service:3009;
            proxy_pass http://$analytics_service;
        }

        # Request Service Routes
        location /api/v1/requests {
            set $request_service wiz_request-service:3010;
            proxy_pass http://$request_service;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Root redirect with monitoring links
        location = / {
            return 200 '{"status":"ok","service":"Wiz Car Rental API Gateway","version":"1.0.0","monitoring":{"grafana":"/grafana/","prometheus":"/prometheus/","kibana":"/kibana/","alertmanager":"/alertmanager/"}}';
            add_header Content-Type application/json;
        }

        # 404 handler
        location / {
            return 404 '{"error":"Not Found","message":"The requested endpoint does not exist"}';
            add_header Content-Type application/json;
        }
    }
}
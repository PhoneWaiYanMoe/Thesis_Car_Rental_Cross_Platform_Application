worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # DNS resolver for Docker Swarm (internal DNS)
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ==================== TIMEOUTS ====================
    proxy_connect_timeout 10s;    # reduced from 300s — fail fast on dead upstream
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    send_timeout 60s;
    client_body_timeout 30s;
    client_header_timeout 10s;
    keepalive_timeout 75s;        # client keepalive

    # ==================== BUFFERS ====================
    client_max_body_size 20M;
    client_body_buffer_size 128k;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    # ==================== PERFORMANCE ====================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1024;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # Common proxy headers
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ==================== MONITORING ====================

        location /grafana/ {
            set $upstream monitoring_grafana:3000;
            proxy_pass http://$upstream;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
        }

        location /prometheus/ {
            set $upstream monitoring_prometheus:9090;
            rewrite ^/prometheus/(.*)$ /$1 break;
            proxy_pass http://$upstream;
        }

        location /kibana/ {
            set $upstream elk_kibana:5601;
            proxy_pass http://$upstream;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
        }

        location /elasticsearch/ {
            set $upstream elk_elasticsearch:9200;
            proxy_pass http://$upstream/;
        }

        location /alertmanager/ {
            set $upstream monitoring_alertmanager:9093;
            rewrite ^/alertmanager/(.*)$ /$1 break;
            proxy_pass http://$upstream;
        }

        location /visualizer/ {
            set $upstream visualizer_visualizer:8080;
            proxy_pass http://$upstream;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
        }

        # ==================== APPLICATION ====================
        # Using set $upstream + proxy_pass http://$upstream forces Nginx to
        # re-resolve DNS on every request — critical for Docker Swarm where
        # VIP addresses change as replicas restart/reschedule across nodes.

        location /auth {
            set $upstream wiz_user-service:3001;
            proxy_pass http://$upstream;
        }

        location /users {
            set $upstream wiz_user-service:3001;
            proxy_pass http://$upstream;
        }

        location /profile {
            set $upstream wiz_user-service:3001;
            proxy_pass http://$upstream;
        }

        location /api/customer-support {
            set $upstream wiz_user-service:3001;
            proxy_pass http://$upstream;
        }

        location /api/favorites {
            set $upstream wiz_user-service:3001;
            proxy_pass http://$upstream;
        }

        location /location {
            set $upstream wiz_location-service:3003;
            proxy_pass http://$upstream;
        }

        location /locations {
            set $upstream wiz_location-service:3003;
            proxy_pass http://$upstream;
        }


        location /vehicles {
            set $upstream wiz_vehicle-service:3002;
            proxy_pass http://$upstream;
        }

        location /bookings {
            set $upstream wiz_booking-service:3004;
            proxy_pass http://$upstream;
        }

        location /reviews {
            set $upstream wiz_review-service:3005;
            proxy_pass http://$upstream;
        }
        location /payment {
            set $upstream wiz_payment-service;
            proxy_pass http://$upstream:3006;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        location /payments {
            set $upstream wiz_payment-service;
            proxy_pass http://$upstream:3006;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        location /notifications {
            set $upstream wiz_notification-service:3007;
            proxy_pass http://$upstream;
        }

        location /media {
            set $upstream wiz_media-service:3008/;
            proxy_pass http://$upstream;
        }

        location /api/analytics {
            set $upstream wiz_analytics-service:3009;
            proxy_pass http://$upstream;
        }

        location /api/v1/requests {
            set $upstream wiz_request-service:3010;
            proxy_pass http://$upstream;
        }

        # ==================== CHAT (WebSocket) ====================
        location /chat {
            set $upstream wiz_chat-service:3011;
            proxy_pass http://$upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ==================== SYSTEM ====================

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location = / {
            return 200 '{"status":"ok","service":"Wiz Car Rental API Gateway","version":"1.0.0"}';
            add_header Content-Type application/json;
        }

        location / {
            return 404 '{"error":"Not Found","message":"The requested endpoint does not exist"}';
            add_header Content-Type application/json;
        }
    }
}
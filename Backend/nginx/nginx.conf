events {
    worker_connections 2048;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # DNS resolver for Docker Swarm
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # Timeouts - INCREASED for monitoring tools
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;
    client_body_timeout 300s;
    client_header_timeout 300s;
    keepalive_timeout 300s;

    # Buffer sizes
    client_max_body_size 20M;
    client_body_buffer_size 128k;
    proxy_buffering off;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name _;

        # Common proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # ==================== MONITORING ENDPOINTS ====================
        
        # Grafana - Monitoring Dashboard
        location /grafana/ {
            set $upstream_grafana monitoring_grafana:3000;
            proxy_pass http://$upstream_grafana/;
            
            # WebSocket support for live updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Prometheus - Metrics Database
        location /prometheus {
            return 301 /prometheus/;
        }
        
        location /prometheus/ {
            set $upstream_prometheus monitoring_prometheus:9090;
            proxy_pass http://$upstream_prometheus/;
            
            # Rewrite redirects to include /prometheus prefix
            proxy_redirect ~^/(.*)$ /prometheus/$1;
        }

        # Kibana - Log Viewer
        location /kibana/ {
            set $upstream_kibana elk_kibana:5601;
            proxy_pass http://$upstream_kibana/;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Elasticsearch - Direct API access
        location /elasticsearch/ {
            set $upstream_elasticsearch elk_elasticsearch:9200;
            proxy_pass http://$upstream_elasticsearch/;
        }

        # Alertmanager - Alert Management
        location /alertmanager {
            return 301 /alertmanager/;
        }
        
        location /alertmanager/ {
            set $upstream_alertmanager monitoring_alertmanager:9093;
            proxy_pass http://$upstream_alertmanager/;
            
            # Rewrite redirects
            proxy_redirect ~^/(.*)$ /alertmanager/$1;
        }

        # cAdvisor - Container Metrics
        location /cadvisor {
            return 301 /cadvisor/;
        }
        
        location /cadvisor/ {
            set $upstream_cadvisor monitoring_cadvisor:8080;
            proxy_pass http://$upstream_cadvisor/;
        }

        # ==================== APPLICATION ENDPOINTS ====================

        # User Service Routes (Auth, Users, Profile)
        location /auth {
            proxy_pass http://user-service:3001;
        }

        location /users {
            proxy_pass http://user-service:3001;
        }

        location /profile {
            proxy_pass http://user-service:3001;
        }

        location /api/customer-support {
            proxy_pass http://user-service:3001;
        }

        location /api/favorites {
            proxy_pass http://user-service:3001;
        }

        # Location Service Routes
        location /locations {
            proxy_pass http://location-service:3003;
        }

        # Vehicle Service Routes
        location /vehicles {
            proxy_pass http://vehicle-service:3002;
        }

        # Booking Service Routes
        location /bookings {
            proxy_pass http://booking-service:3004;
        }

        # Review Service Routes
        location /reviews {
            proxy_pass http://review-service:3005;
        }

        # Payment Service Routes
        location /payment {
            proxy_pass http://payment-service:3006;
        }

        location /payments {
            proxy_pass http://payment-service:3006;
        }

        # Notification Service Routes
        location /notifications {
            proxy_pass http://notification-service:3007;
        }

        # Media Service Routes
        location /media {
            proxy_pass http://media-service:3008;
        }

        # Analytics Service Routes
        location /api/analytics {
            proxy_pass http://analytics-service:3009;
        }

        # Request Service Routes
        location /api/v1/requests {
            proxy_pass http://request-service:3010;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Root with monitoring links
        location = / {
            return 200 '{"status":"ok","service":"Wiz Car Rental API Gateway","version":"1.0.0","monitoring":{"grafana":"/grafana/","prometheus":"/prometheus/","kibana":"/kibana/","alertmanager":"/alertmanager/","elasticsearch":"/elasticsearch/","cadvisor":"/cadvisor/"}}';
            add_header Content-Type application/json;
        }

        # 404 handler
        location / {
            return 404 '{"error":"Not Found","message":"The requested endpoint does not exist"}';
            add_header Content-Type application/json;
        }
    }
}
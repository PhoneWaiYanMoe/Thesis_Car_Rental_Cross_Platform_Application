events {
    worker_connections 2048;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Timeouts
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;
    client_body_timeout 300s;
    client_header_timeout 300s;

    # Buffer sizes
    client_max_body_size 20M;
    client_body_buffer_size 128k;

    # Upstream definitions
    upstream user_service {
        server user-service:3001 max_fails=3 fail_timeout=30s;
    }

    upstream location_service {
        server location-service:3003 max_fails=3 fail_timeout=30s;
    }

    upstream vehicle_service {
        server vehicle-service:3002 max_fails=3 fail_timeout=30s;
    }

    upstream booking_service {
        server booking-service:3004 max_fails=3 fail_timeout=30s;
    }

    upstream review_service {
        server review-service:3005 max_fails=3 fail_timeout=30s;
    }

    upstream payment_service {
        server payment-service:3006 max_fails=3 fail_timeout=30s;
    }

    upstream notification_service {
        server notification-service:3007 max_fails=3 fail_timeout=30s;
    }

    upstream media_service {
        server media-service:3008 max_fails=3 fail_timeout=30s;
    }
    upstream analytics_service {
        server analytics-service:3009 max_fails=3 fail_timeout=30s;
    }

    upstream request_service {
        server request-service:3010 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;

        # Common proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # User Service Routes (Auth, Users, Profile)
        location /auth {
            proxy_pass http://user_service;
        }

        location /users {
            proxy_pass http://user_service;
        }

        location /profile {
            proxy_pass http://user_service;
        }

        location /api/customer-support {
            proxy_pass http://user_service;
        }

        location /api/favorites {
            proxy_pass http://user_service;
        }

        # Location Service Routes
        location /locations {
            proxy_pass http://location_service;
        }

        # Vehicle Service Routes
        location /vehicles {
            proxy_pass http://vehicle_service;
        }

        # Booking Service Routes
        location /bookings {
            proxy_pass http://booking_service;
        }

        # Review Service Routes
        location /reviews {
            proxy_pass http://review_service;
        }

        # Payment Service Routes
        location /payment {
            proxy_pass http://payment_service;
        }

        location /payments {
            proxy_pass http://payment_service;
        }

        # Notification Service Routes
        location /notifications {
            proxy_pass http://notification_service;
        }

        # Media Service Routes
        location /media {
            proxy_pass http://media_service;
        }

        location /api/analytics {
            proxy_pass http://analytics_service;
        }

        # Request Service Routes
        location /api/v1/requests {
            proxy_pass http://request_service;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Root redirect
        location = / {
            return 200 '{"status":"ok","service":"Wiz Car Rental API Gateway","version":"1.0.0"}';
            add_header Content-Type application/json;
        }

        # 404 handler
        location / {
            return 404 '{"error":"Not Found","message":"The requested endpoint does not exist"}';
            add_header Content-Type application/json;
        }
    }
}
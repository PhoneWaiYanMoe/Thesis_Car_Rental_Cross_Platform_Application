events {
    worker_connections 2048;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Timeouts - INCREASED for monitoring tools
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;
    client_body_timeout 300s;
    client_header_timeout 300s;
    keepalive_timeout 300s;

    # Buffer sizes
    client_max_body_size 20M;
    client_body_buffer_size 128k;
    proxy_buffering off;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Upstream definitions for monitoring services
    upstream grafana_backend {
        server tasks.grafana:3000 max_fails=3 fail_timeout=30s;
    }

    upstream prometheus_backend {
        server tasks.prometheus:9090 max_fails=3 fail_timeout=30s;
    }

    upstream kibana_backend {
        server tasks.kibana:5601 max_fails=3 fail_timeout=30s;
    }

    upstream elasticsearch_backend {
        server tasks.elasticsearch:9200 max_fails=3 fail_timeout=30s;
    }

    upstream alertmanager_backend {
        server tasks.alertmanager:9093 max_fails=3 fail_timeout=30s;
    }

    upstream cadvisor_backend {
        server tasks.cadvisor:8080 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;

        # Common proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # ==================== MONITORING ENDPOINTS ====================
        
        # Grafana - Monitoring Dashboard
        location /grafana/ {
            proxy_pass http://grafana_backend/;
            
            # WebSocket support for live updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Grafana needs base URL rewrite
            proxy_redirect off;
            rewrite ^/grafana/(.*)$ /$1 break;
        }

        # Grafana API (needed for health checks)
        location /grafana/api/ {
            proxy_pass http://grafana_backend/api/;
        }

        # Prometheus - Metrics Database  
        location /prometheus/ {
            proxy_pass http://prometheus_backend/;
            proxy_redirect off;
            rewrite ^/prometheus/(.*)$ /$1 break;
        }

        # Prometheus API
        location /prometheus/api/ {
            proxy_pass http://prometheus_backend/api/;
        }

        # Kibana - Log Viewer
        location /kibana/ {
            proxy_pass http://kibana_backend/;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_redirect off;
            rewrite ^/kibana/(.*)$ /$1 break;
        }

        # Elasticsearch - Direct API access
        location /elasticsearch/ {
            proxy_pass http://elasticsearch_backend/;
            proxy_redirect off;
            rewrite ^/elasticsearch/(.*)$ /$1 break;
        }

        # Alertmanager - Alert Management
        location /alertmanager/ {
            proxy_pass http://alertmanager_backend/;
            proxy_redirect off;
            rewrite ^/alertmanager/(.*)$ /$1 break;
        }

        # cAdvisor - Container Metrics
        location /cadvisor/ {
            proxy_pass http://cadvisor_backend/;
            proxy_redirect off;
            rewrite ^/cadvisor/(.*)$ /$1 break;
        }

        # ==================== APPLICATION ENDPOINTS ====================

        # User Service Routes (Auth, Users, Profile)
        location /auth {
            proxy_pass http://tasks.user-service:3001;
        }

        location /users {
            proxy_pass http://tasks.user-service:3001;
        }

        location /profile {
            proxy_pass http://tasks.user-service:3001;
        }

        location /api/customer-support {
            proxy_pass http://tasks.user-service:3001;
        }

        location /api/favorites {
            proxy_pass http://tasks.user-service:3001;
        }

        # Location Service Routes
        location /locations {
            proxy_pass http://tasks.location-service:3003;
        }

        # Vehicle Service Routes
        location /vehicles {
            proxy_pass http://tasks.vehicle-service:3002;
        }

        # Booking Service Routes
        location /bookings {
            proxy_pass http://tasks.booking-service:3004;
        }

        # Review Service Routes
        location /reviews {
            proxy_pass http://tasks.review-service:3005;
        }

        # Payment Service Routes
        location /payment {
            proxy_pass http://tasks.payment-service:3006;
        }

        location /payments {
            proxy_pass http://tasks.payment-service:3006;
        }

        # Notification Service Routes
        location /notifications {
            proxy_pass http://tasks.notification-service:3007;
        }

        # Media Service Routes
        location /media {
            proxy_pass http://tasks.media-service:3008;
        }

        # Analytics Service Routes
        location /api/analytics {
            proxy_pass http://tasks.analytics-service:3009;
        }

        # Request Service Routes
        location /api/v1/requests {
            proxy_pass http://tasks.request-service:3010;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Root with monitoring links
        location = / {
            return 200 '{"status":"ok","service":"Wiz Car Rental API Gateway","version":"1.0.0","monitoring":{"grafana":"/grafana/","prometheus":"/prometheus/","kibana":"/kibana/","alertmanager":"/alertmanager/","elasticsearch":"/elasticsearch/","cadvisor":"/cadvisor/"}}';
            add_header Content-Type application/json;
        }

        # 404 handler
        location / {
            return 404 '{"error":"Not Found","message":"The requested endpoint does not exist"}';
            add_header Content-Type application/json;
        }
    }
}
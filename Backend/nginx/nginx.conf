events {
    worker_connections 2048;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # DNS resolver for Docker Swarm
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Timeouts
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;
    client_body_timeout 300s;
    client_header_timeout 300s;
    keepalive_timeout 300s;

    # Buffer sizes
    client_max_body_size 20M;
    client_body_buffer_size 128k;
    proxy_buffering off;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name _;

        # Common proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # ==================== MONITORING ====================

        # Grafana
        location /grafana/ {
            set $upstream monitoring_grafana;
            proxy_pass http://$upstream:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Prometheus
        location /prometheus/ {
            set $upstream monitoring_prometheus;
            rewrite ^/prometheus/(.*)$ /$1 break;
            proxy_pass http://$upstream:9090;
        }

        # Kibana
        location /kibana/ {
            set $upstream elk_kibana;
            proxy_pass http://$upstream:5601;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Elasticsearch
        location /elasticsearch/ {
            set $upstream elk_elasticsearch;
            proxy_pass http://$upstream:9200/;
        }

        # Alertmanager
        location /alertmanager/ {
            set $upstream monitoring_alertmanager;
            rewrite ^/alertmanager/(.*)$ /$1 break;
            proxy_pass http://$upstream:9093;
        }

        # Visualizer
        location /visualizer/ {
            set $upstream visualizer_visualizer;
            proxy_pass http://$upstream:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ==================== APPLICATION ====================

        location /auth {
            set $upstream wiz_user-service;
            proxy_pass http://$upstream:3001;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /users {
            set $upstream wiz_user-service;
            proxy_pass http://$upstream:3001;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /profile {
            set $upstream wiz_user-service;
            proxy_pass http://$upstream:3001;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/customer-support {
            set $upstream wiz_user-service;
            proxy_pass http://$upstream:3001;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/favorites {
            set $upstream wiz_user-service;
            proxy_pass http://$upstream:3001;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /locations {
            set $upstream wiz_location-service;
            proxy_pass http://$upstream:3003;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /vehicles {
            set $upstream wiz_vehicle-service;
            proxy_pass http://$upstream:3002;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /bookings {
            set $upstream wiz_booking-service;
            proxy_pass http://$upstream:3004;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /reviews {
            set $upstream wiz_review-service;
            proxy_pass http://$upstream:3005;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /payment {
            set $upstream wiz_payment-service;
            proxy_pass http://$upstream:3006;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /payments {
            set $upstream wiz_payment-service;
            proxy_pass http://$upstream:3006;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /notifications {
            set $upstream wiz_notification-service;
            proxy_pass http://$upstream:3007;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /media {
            set $upstream wiz_media-service;
            proxy_pass http://$upstream:3008;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/analytics {
            set $upstream wiz_analytics-service;
            proxy_pass http://$upstream:3009;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/v1/requests {
            set $upstream wiz_request-service;
            proxy_pass http://$upstream:3010;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ==================== CHAT (WebSocket) ====================

        location /chat {
            set $upstream wiz_chat-service;
            proxy_pass http://$upstream:3011;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ==================== SYSTEM ====================

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location = / {
            return 200 '{"status":"ok","service":"Wiz Car Rental API Gateway","version":"1.0.0","monitoring":{"grafana":"/grafana/","prometheus":"/prometheus/","kibana":"/kibana/","alertmanager":"/alertmanager/","elasticsearch":"/elasticsearch/"}}';
            add_header Content-Type application/json;
        }

        location / {
            return 404 '{"error":"Not Found","message":"The requested endpoint does not exist"}';
            add_header Content-Type application/json;
        }
    }
}
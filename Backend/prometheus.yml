global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'wiz-car-rental-production'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - 'alerts.yml'

# Scrape configurations
scrape_configs:
  # ==================== PROMETHEUS SELF-MONITORING ====================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          node: 'wiz-production'

  # ==================== NODE EXPORTER (Host Metrics) ====================
  # This will be deployed as a global service, so Prometheus will discover all nodes
  - job_name: 'node-exporter'
    dns_sd_configs:
      - names:
          - 'tasks.node-exporter'
        type: 'A'
        port: 9100
    relabel_configs:
      - source_labels: [__meta_dns_name]
        target_label: node
      - source_labels: [__address__]
        target_label: instance

  # ==================== CADVISOR (Container Metrics) ====================
  # Also global service - will discover all nodes
  - job_name: 'cadvisor'
    dns_sd_configs:
      - names:
          - 'tasks.cadvisor'
        type: 'A'
        port: 8080
    relabel_configs:
      - source_labels: [__meta_dns_name]
        target_label: node
      - source_labels: [__address__]
        target_label: instance

  # ==================== DOCKER SWARM SERVICES ====================
  # Using DNS service discovery for automatic scaling
  
  - job_name: 'user-service'
    dns_sd_configs:
      - names:
          - 'tasks.user-service'
        type: 'A'
        port: 3001
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'vehicle-service'
    dns_sd_configs:
      - names:
          - 'tasks.vehicle-service'
        type: 'A'
        port: 3002
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'location-service'
    dns_sd_configs:
      - names:
          - 'tasks.location-service'
        type: 'A'
        port: 3003
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'booking-service'
    dns_sd_configs:
      - names:
          - 'tasks.booking-service'
        type: 'A'
        port: 3004
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'review-service'
    dns_sd_configs:
      - names:
          - 'tasks.review-service'
        type: 'A'
        port: 3005
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'payment-service'
    dns_sd_configs:
      - names:
          - 'tasks.payment-service'
        type: 'A'
        port: 3006
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'notification-service'
    dns_sd_configs:
      - names:
          - 'tasks.notification-service'
        type: 'A'
        port: 3007
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'media-service'
    dns_sd_configs:
      - names:
          - 'tasks.media-service'
        type: 'A'
        port: 3008
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'analytics-service'
    dns_sd_configs:
      - names:
          - 'tasks.analytics-service'
        type: 'A'
        port: 3009
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'request-service'
    dns_sd_configs:
      - names:
          - 'tasks.request-service'
        type: 'A'
        port: 3010
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ==================== INFRASTRUCTURE ====================
  - job_name: 'redis'
    dns_sd_configs:
      - names:
          - 'tasks.redis'
        type: 'A'
        port: 6379
    # Note: Redis doesn't expose Prometheus metrics by default
    # We'll add redis_exporter in Phase 5

  - job_name: 'rabbitmq'
    dns_sd_configs:
      - names:
          - 'tasks.rabbitmq'
        type: 'A'
        port: 15672
    metrics_path: '/api/metrics'
    # RabbitMQ management plugin exposes Prometheus metrics

  # ==================== NGINX ====================
  - job_name: 'nginx'
    dns_sd_configs:
      - names:
          - 'tasks.nginx'
        type: 'A'
        port: 80
    metrics_path: '/metrics'
    # Will need nginx-prometheus-exporter or VTS module
version: "3.9"

services:
  # ==================== SHARED DATABASE (PostgreSQL) ====================
  postgres:
    image: postgres:18-alpine
    container_name: wiz-postgres-shared
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: wiz_user,wiz_location,wiz_booking,wiz_vehicle,wiz_payment,wiz_media_db,wiz_request_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_shared_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    networks:
      - wiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  mongodb:
    image: mongo:8.0
    container_name: wiz-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-wiz_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-wiz_password}
      MONGO_INITDB_DATABASE: wiz_reviews
    ports:
      - "27020:27020"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./scripts/init-mongodb.js:/docker-entrypoint-initdb.d/init-mongodb.js:ro
    command: --port 27020
    networks:
      - wiz-network
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--port",
          "27020",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==================== REDIS (Shared Cache) ====================
  redis:
    image: redis:7-alpine
    container_name: wiz-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wiz-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: wiz-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-admin123}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - wiz-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  # ==================== USER SERVICE ====================
  user-service:
    build: ./user-service
    container_name: wiz-user-service
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "50053:50053"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_user
      - PORT=3001
      - GRPC_PORT=50053
      - NODE_ENV=development
      - BASE_URL=http://localhost:3001
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=24h
      - JWT_REFRESH_SECRET=${JWT_SECRET}
      - JWT_REFRESH_EXPIRES_IN=7d
      - OTP_EXPIRY_MINUTES=10
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=http://localhost:3001/auth/google/callback
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET}
      - FACEBOOK_CALLBACK_URL=http://localhost:3001/auth/facebook/callback
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - LOCATION_SERVICE_GRPC_URL=location-service:50051
      - VEHICLE_SERVICE_GRPC_URL=wiz-vehicle-service:50055
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin123}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy 
    volumes:
      - ./user-service/src:/app/src
      - ./user-service/proto:/app/proto
    networks:
      - wiz-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(50053, 'localhost').on('connect', () => process.exit(0)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== LOCATION SERVICE ====================
  location-service:
    build: ./location-service
    container_name: wiz-location-service
    restart: unless-stopped
    ports:
      - "3003:3003"
      - "50051:50051"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_location
      - PORT=3003
      - GRPC_PORT=50051
      - NODE_ENV=development
      - BASE_URL=http://localhost:3003
      - JWT_SECRET=${JWT_SECRET}
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./location-service/src:/app/src
    networks:
      - wiz-network

  # ==================== VEHICLE SERVICE ====================
  vehicle-service:
    build: ./vehicle-service
    container_name: wiz-vehicle-service
    restart: unless-stopped
    ports:
      - "3002:3002"
      - "50055:50055"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_vehicle
      - PORT=3002
      - GRPC_PORT=50055
      - NODE_ENV=development
      - BASE_URL=http://localhost:3002
      - JWT_SECRET=${JWT_SECRET}
      - USER_SERVICE_GRPC_URL=wiz-user-service:50053
      - REVIEW_SERVICE_GRPC_URL=wiz-review-service:50054
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
    volumes:
      - ./vehicle-service/src:/app/src
      - ./vehicle-service/proto:/app/proto
    networks:
      - wiz-network

  # ==================== PAYMENT SERVICE ====================
  payment-service:
    build: ./payment-service
    container_name: wiz-payment-service
    restart: unless-stopped
    ports:
      - "3006:3006"
      - "50056:50056"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_payment
      - PORT=3006
      - GRPC_PORT=50056
      - NODE_ENV=development
      - BASE_URL=http://localhost:3006
      - JWT_SECRET=${JWT_SECRET}
      - BOOKING_SERVICE_GRPC_URL=wiz-booking-service:50052
      - VEHICLE_SERVICE_GRPC_URL=wiz-vehicle-service:50055
      - MOCK_PAYMENT=${MOCK_PAYMENT:-false}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}
      - PAYPAL_MODE=sandbox
      - VNPAY_TMN_CODE=${VNPAY_TMN_CODE}
      - VNPAY_HASH_SECRET=${VNPAY_HASH_SECRET}
      - VNPAY_URL=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - VNPAY_RETURN_URL=https://master-albacore-urgently.ngrok-free.app/payment/webhook/vnpay
      - FRONTEND_URL=https://master-albacore-urgently.ngrok-free.app
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ENCRYPTION_IV=${ENCRYPTION_IV}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./payment-service/src:/app/src
      - ./payment-service/proto:/app/proto
    networks:
      - wiz-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(50056, 'localhost').on('connect', () => process.exit(0)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  # ==================== BOOKING SERVICE ====================
  booking-service:
    build: ./booking-service
    container_name: wiz-booking-service
    restart: unless-stopped
    ports:
      - "3004:3004"
      - "50052:50052"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_booking
      - PORT=3004
      - GRPC_PORT=50052
      - NODE_ENV=development
      - BASE_URL=http://localhost:3004
      - JWT_SECRET=${JWT_SECRET}
      - LOCATION_SERVICE_GRPC_URL=wiz-location-service:50051
      - USER_SERVICE_GRPC_URL=wiz-user-service:50053
      - VEHICLE_SERVICE_GRPC_URL=wiz-vehicle-service:50055
      - REVIEW_SERVICE_GRPC_URL=wiz-review-service:50054
      - PAYMENT_SERVICE_GRPC_URL=wiz-payment-service:50056
      - MEDIA_SERVICE_URL=http://wiz-media-service:3008 
    depends_on:
      postgres:
        condition: service_healthy
      location-service:
        condition: service_started
      vehicle-service:
        condition: service_started
      user-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    volumes:
      - ./booking-service/src:/app/src
      - ./booking-service/proto:/app/proto
    networks:
      - wiz-network

  # ==================== REVIEW SERVICE ====================
  review-service:
    build: ./review-service
    container_name: wiz-review-service
    restart: unless-stopped
    ports:
      - "3005:3005"
      - "50054:50054"
    environment:
      - MONGODB_URI=mongodb://${MONGODB_USER:-wiz_user}:${MONGODB_PASSWORD:-wiz_password}@mongodb:27020/wiz_reviews?authSource=admin
      - MONGODB_USER=${MONGODB_USER:-wiz_user}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD:-wiz_password}
      - PORT=3005
      - GRPC_PORT=50054
      - NODE_ENV=development
      - BASE_URL=http://localhost:3005
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_here}
      - BOOKING_SERVICE_GRPC_URL=wiz-booking-service:50052
      - USER_SERVICE_GRPC_URL=wiz-user-service:50053
      - VEHICLE_SERVICE_GRPC_URL=wiz-vehicle-service:50055
    depends_on:
      mongodb:
        condition: service_healthy
      booking-service:
        condition: service_started
      vehicle-service:
        condition: service_started
      user-service:
        condition: service_healthy
    volumes:
      - ./review-service/src:/app/src
    networks:
      - wiz-network

  # ==================== NOTIFICATION SERVICE ====================
  notification-service:
    build: ./notification-service
    container_name: wiz-notification-service
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
      - NODE_ENV=development
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin123}@rabbitmq:5672
      - USER_SERVICE_URL=http://user-service:3001
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_SECURE=false
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_FROM_NAME=Wiz Car Rental
      - EMAIL_FROM_ADDRESS=noreply@wizcarrental.com
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY:-}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_healthy
    volumes:
      - ./notification-service/src:/app/src
    networks:
      - wiz-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3007/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== MEDIA SERVICE ====================
  media-service:
    build: ./media-service
    container_name: wiz-media-service
    restart: unless-stopped
    ports:
      - "3008:3008"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_media_db
      - PORT=3008
      - NODE_ENV=development
      - BASE_URL=http://localhost:3008
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - MAX_FILE_SIZE=5242880
      - ALLOWED_IMAGE_TYPES=image/jpeg,image/png,image/jpg,image/webp
      - ALLOWED_DOCUMENT_TYPES=application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./media-service/src:/app/src
    networks:
      - wiz-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3008/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== REQUEST SERVICE ====================
  request-service:
    build: ./request-service
    container_name: wiz-request-service
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_request_db
      - PORT=3010
      - NODE_ENV=development
      - BASE_URL=http://localhost:3010
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin123}@rabbitmq:5672
      - USER_SERVICE_URL=http://user-service:3001
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - ANALYTICS_SERVICE_URL=http://analytics-service:3009
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./request-service/src:/app/src
    networks:
      - wiz-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3010/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      
volumes:
  postgres_shared_data:
  mongodb_data:
  mongodb_config:
  redis_data:
  rabbitmq_data:

networks:
  wiz-network:
    driver: bridge

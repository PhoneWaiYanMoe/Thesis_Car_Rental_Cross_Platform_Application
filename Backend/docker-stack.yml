version: "3.8"

# =====================================================================
# PRODUCTION SWARM STACK
# Build images first (on manager or CI):
#   docker build --target production -t 206.189.147.242:5000/wiz-user-service:latest ./user-service
#   ... (repeat per service)
# Deploy:
#   docker stack deploy -c docker-stack.yml wiz
# =====================================================================

services:
  # ==================== NGINX REVERSE PROXY ====================
  nginx:
    image: 206.189.147.242:5000/wiz-nginx:latest
    ports:
      - "80:80"
      - "443:443"
    networks:
      - wiz-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - wiz-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== RABBITMQ ====================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - wiz-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.75'
          memory: 1024M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== USER SERVICE ====================
  # Critical path: handles auth on every request — keep 3 replicas min
  user-service:
    image: 206.189.147.242:5000/wiz-user-service:latest
    # To build: docker build --target production -t 206.189.147.242:5000/wiz-user-service:latest ./user-service
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_user
      - DB_SSL=${DB_SSL}
      - PORT=3001
      - GRPC_PORT=50053
      - NODE_ENV=production
      - BASE_URL=${BASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=24h
      - JWT_REFRESH_SECRET=${JWT_SECRET}
      - JWT_REFRESH_EXPIRES_IN=7d
      - OTP_EXPIRY_MINUTES=10
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_SECURE=${EMAIL_SECURE}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${BASE_URL}/auth/google/callback
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET}
      - FACEBOOK_CALLBACK_URL=${BASE_URL}/auth/facebook/callback
      - FRONTEND_URL=${FRONTEND_URL}
      - LOCATION_SERVICE_GRPC_URL=location-service:50051
      - VEHICLE_SERVICE_GRPC_URL=vehicle-service:50055
      - RABBITMQ_URL=${RABBITMQ_URL}
    networks:
      - wiz-network
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        order: start-first       # start new replica before killing old = zero downtime
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(50053,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ==================== LOCATION SERVICE ====================
  location-service:
    image: 206.189.147.242:5000/wiz-location-service:latest
    ports:
      - "3003:3003"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_location
      - DB_SSL=${DB_SSL}
      - PORT=3003
      - GRPC_PORT=50051
      - NODE_ENV=production
      - BASE_URL=${BASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    networks:
      - wiz-network
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ==================== VEHICLE SERVICE ====================
  vehicle-service:
    image: 206.189.147.242:5000/wiz-vehicle-service:latest
    ports:
      - "3002:3002"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_vehicle
      - DB_SSL=${DB_SSL}
      - PORT=3002
      - GRPC_PORT=50055
      - NODE_ENV=production
      - BASE_URL=${BASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - USER_SERVICE_GRPC_URL=user-service:50053
      - REVIEW_SERVICE_GRPC_URL=review-service:50054
    networks:
      - wiz-network
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ==================== PAYMENT SERVICE ====================
  payment-service:
    image: 206.189.147.242:5000/wiz-payment-service:latest
    ports:
      - "3006:3006"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_payment
      - DB_SSL=${DB_SSL}
      - PORT=3006
      - GRPC_PORT=50056
      - NODE_ENV=production
      - BASE_URL=${BASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - BOOKING_SERVICE_GRPC_URL=booking-service:50052
      - VEHICLE_SERVICE_GRPC_URL=vehicle-service:50055
      - MOCK_PAYMENT=${MOCK_PAYMENT}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET}
      - PAYPAL_MODE=${PAYPAL_MODE}
      - VNPAY_TMN_CODE=${VNPAY_TMN_CODE}
      - VNPAY_HASH_SECRET=${VNPAY_HASH_SECRET}
      - VNPAY_URL=${VNPAY_URL}
      - VNPAY_RETURN_URL=${VNPAY_RETURN_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ENCRYPTION_IV=${ENCRYPTION_IV}
    networks:
      - wiz-network
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(50056,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== BOOKING SERVICE ====================
  booking-service:
    image: 206.189.147.242:5000/wiz-booking-service:latest
    ports:
      - "3004:3004"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_booking
      - DB_SSL=${DB_SSL}
      - PORT=3004
      - GRPC_PORT=50052
      - NODE_ENV=production
      - BASE_URL=${BASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - LOCATION_SERVICE_GRPC_URL=location-service:50051
      - USER_SERVICE_GRPC_URL=user-service:50053
      - VEHICLE_SERVICE_GRPC_URL=vehicle-service:50055
      - REVIEW_SERVICE_GRPC_URL=review-service:50054
      - PAYMENT_SERVICE_GRPC_URL=payment-service:50056
      - MEDIA_SERVICE_URL=http://media-service:3008
      - RABBITMQ_URL=${RABBITMQ_URL}
    networks:
      - wiz-network
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ==================== REVIEW SERVICE ====================
  review-service:
    image: 206.189.147.242:5000/wiz-review-service:latest
    ports:
      - "3005:3005"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_USER=${MONGODB_USER}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - PORT=3005
      - GRPC_PORT=50054
      - NODE_ENV=production
      - BASE_URL=${BASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - BOOKING_SERVICE_GRPC_URL=booking-service:50052
      - USER_SERVICE_GRPC_URL=user-service:50053
      - VEHICLE_SERVICE_GRPC_URL=vehicle-service:50055
    networks:
      - wiz-network
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ==================== NOTIFICATION SERVICE ====================
  notification-service:
    image: 206.189.147.242:5000/wiz-notification-service:latest
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
      - NODE_ENV=production
      - RABBITMQ_URL=${RABBITMQ_URL}
      - USER_SERVICE_URL=http://user-service:3001
      - FRONTEND_URL=${FRONTEND_URL}
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_SECURE=${EMAIL_SECURE}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_FROM_NAME=Wiz Car Rental
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
    networks:
      - wiz-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3007/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== MEDIA SERVICE ====================
  media-service:
    image: 206.189.147.242:5000/wiz-media-service:latest
    ports:
      - "3008:3008"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_media_db
      - DB_SSL=${DB_SSL}
      - PORT=3008
      - NODE_ENV=production
      - BASE_URL=${BASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - MAX_FILE_SIZE=5242880
      - ALLOWED_IMAGE_TYPES=image/jpeg,image/png,image/jpg,image/webp
      - ALLOWED_DOCUMENT_TYPES=application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
    networks:
      - wiz-network
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3008/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ==================== ANALYTICS SERVICE ====================
  analytics-service:
    image: 206.189.147.242:5000/wiz-analytics-service:latest
    ports:
      - "3009:3009"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_analytics
      - DB_SSL=${DB_SSL}
      - PORT=3009
      - NODE_ENV=production
      - BASE_URL=${BASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - USER_SERVICE_GRPC_URL=user-service:50053
      - VEHICLE_SERVICE_GRPC_URL=vehicle-service:50055
      - BOOKING_SERVICE_GRPC_URL=booking-service:50052
      - PAYMENT_SERVICE_GRPC_URL=payment-service:50056
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - wiz-network
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3009/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ==================== REQUEST SERVICE ====================
  request-service:
    image: 206.189.147.242:5000/wiz-request-service:latest
    ports:
      - "3010:3010"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_request_db
      - DB_SSL=${DB_SSL}
      - PORT=3010
      - NODE_ENV=production
      - BASE_URL=${BASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - USER_SERVICE_URL=http://user-service:3001
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - ANALYTICS_SERVICE_URL=http://analytics-service:3009
    networks:
      - wiz-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ==================== CHAT SERVICE (WebSocket) ====================
  # Note: keep replicas: 1 unless you add sticky sessions / Redis pub-sub coordination
  chat-service:
    image: 206.189.147.242:5000/wiz-chat-service:latest
    ports:
      - "3011:3011"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=wiz_chat
      - DB_SSL=${DB_SSL}
      - PORT=3011
      - NODE_ENV=production
      - BASE_URL=${BASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - ONLINE_STATUS_TIMEOUT=300
      - TYPING_TIMEOUT=3
      - SOCKET_PING_TIMEOUT=60000
      - SOCKET_PING_INTERVAL=25000
    networks:
      - wiz-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3011/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  redis_data:
  rabbitmq_data:

networks:
  wiz-network:
    driver: overlay
    attachable: true
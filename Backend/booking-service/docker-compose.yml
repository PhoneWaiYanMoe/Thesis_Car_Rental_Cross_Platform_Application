version: "3.9"

services:
  db:
    image: postgres:18-alpine
    container_name: wiz-booking-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - booking_postgres_data:/var/lib/postgresql/data
    networks:
      - wiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: wiz-booking-service
    restart: always
    ports:
      - "3004:3004"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - PORT=3004
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=development
      - BASE_URL=http://localhost:3004
      - LOCATION_SERVICE_GRPC_URL=wiz-location-service:50051
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    networks:
      - wiz-network

volumes:
  booking_postgres_data:

networks:
  wiz-network:
    external: true
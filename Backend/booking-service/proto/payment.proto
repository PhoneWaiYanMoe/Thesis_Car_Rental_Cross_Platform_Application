// Backend/booking-service/proto/payment.proto
// ✅ NEW FILE: Defines payment service interface

syntax = "proto3";

package payment;

service PaymentService {
  // Create deposit payment intent (30% of total)
  rpc CreateDepositIntent(CreatePaymentIntentRequest) returns (CreatePaymentIntentResponse);
  
  // Create final payment intent (70% of total)
  rpc CreateFinalPaymentIntent(CreatePaymentIntentRequest) returns (CreatePaymentIntentResponse);
  
  // Verify payment status for booking
  rpc VerifyPaymentStatus(VerifyPaymentRequest) returns (VerifyPaymentResponse);
  
  // Get transaction details
  rpc GetTransactionDetails(GetTransactionRequest) returns (TransactionDetails);
  
  // Process automatic refund
  rpc ProcessRefund(RefundRequest) returns (RefundResponse);
}

// ==================== PAYMENT INTENT MESSAGES ====================

message CreatePaymentIntentRequest {
  string booking_id = 1;
  string user_id = 2;
  int32 amount = 3;
  string provider = 4; // "stripe", "paypal", "vnpay"
  string payment_method_id = 5; // Optional
}

message CreatePaymentIntentResponse {
  string intent_id = 1;
  string client_secret = 2;
  string payment_url = 3; // For VNPay redirect
  string status = 4;
  string provider = 5;
  int32 amount = 6;
  string currency = 7;
  string message = 8;
}

// ==================== VERIFICATION MESSAGES ====================

message VerifyPaymentRequest {
  string booking_id = 1;
}

message VerifyPaymentResponse {
  bool deposit_paid = 1;
  bool final_payment_paid = 2;
  int32 deposit_amount = 3;
  int32 final_payment_amount = 4;
  string status = 5;
}

// ==================== TRANSACTION MESSAGES ====================

message GetTransactionRequest {
  string transaction_id = 1;
}

message TransactionDetails {
  string transaction_id = 1;
  string booking_id = 2;
  string user_id = 3;
  string type = 4;
  int32 amount = 5;
  string status = 6;
  string provider = 7;
}

// ==================== REFUND MESSAGES ====================

message RefundRequest {
  string booking_id = 1;
  string user_id = 2;
  int32 amount = 3;
  string reason = 4;
  string notes = 5;
}

message RefundResponse {
  bool success = 1;
  string refund_id = 2;
  int32 amount = 3;
  string status = 4;
  string message = 5;
}
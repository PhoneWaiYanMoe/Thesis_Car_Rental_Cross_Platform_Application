openapi: 3.0.3
info:
  title: Wiz Booking Service API
  description: |
    Complete Booking Service APIs with updated flow:
    
    **Booking Flow:**
    1. pending → (owner accepts) → booking
    2. booking → (customer signs contract + picks up car with 3 photos) → picked_up
    3. picked_up → (customer returns car with 3 photos) → return_submitted
    4. return_submitted → (owner confirms):
       - complete → completed
       - dispute → dispute_opened → under_review (CS) → completed/completed_with_charge
    
    **No-Show Policy:**
    - If customer doesn't pick up car within 24 hours after start date
    - Booking automatically cancelled with NO refund
    - Checked by hourly cron job
    
    **Roles:**
    - customer: Books vehicles
    - owner: Manages vehicle rentals
    - customer-support: Handles disputes
    - admin: System administration
  version: 3.0.0

servers:
  - url: http://localhost:3004
    description: Local development

tags:
  - name: Verification
    description: User verification (license + selfies)
  - name: Customer
    description: Customer booking management
  - name: Owner
    description: Owner rental request management

paths:
  # ==================== VERIFICATION ====================
  /bookings/verification/me:
    get:
      summary: Check verification status
      tags: [Verification]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Verification status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationStatus'

  /bookings/verification:
    post:
      summary: Upload verification (license + selfies)
      tags: [Verification]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationUpload'
      responses:
        '200':
          description: Verification saved

  # ==================== CUSTOMER BOOKINGS ====================
  /bookings:
    post:
      summary: Create new booking
      tags: [Customer]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Booking created

  /bookings/my-bookings:
    get:
      summary: Get customer's bookings
      tags: [Customer]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, pending, booking, picked_up, return_submitted, completed, cancelled]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List of bookings

  /bookings/{id}:
    get:
      summary: Get booking details
      tags: [Customer, Owner]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Booking details

  /bookings/{id}/sign-contract:
    post:
      summary: Sign rental contract (booking day only)
      tags: [Customer]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signature
                - agreedToTerms
              properties:
                signature:
                  type: string
                  description: Base64 signature
                  example: "data:image/png;base64,iVBORw0KGgo..."
                agreedToTerms:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Contract signed

  /bookings/{id}/confirm-pickup:
    post:
      summary: Confirm car pickup (with 3 photos)
      description: Customer confirms pickup. Status changes from 'booking' to 'picked_up'
      tags: [Customer]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pickupPhotos
                - odometerReading
              properties:
                pickupPhotos:
                  type: array
                  items:
                    type: string
                  minItems: 3
                  description: Array of 3+ photo URLs
                  example: 
                    - "https://cdn.com/pickup1.jpg"
                    - "https://cdn.com/pickup2.jpg"
                    - "https://cdn.com/pickup3.jpg"
                odometerReading:
                  type: integer
                  example: 109211
                notes:
                  type: string
                  example: "Car is in excellent condition"
      responses:
        '200':
          description: Pickup confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Car pickup confirmed"
                  bookingStatus:
                    type: string
                    example: "picked_up"

  /bookings/{id}/confirm-return:
    post:
      summary: Confirm car return (with 3 photos)
      description: Customer confirms return. Status changes from 'picked_up' to 'return_submitted'
      tags: [Customer]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - returnPhotos
                - odometerReading
              properties:
                returnPhotos:
                  type: array
                  items:
                    type: string
                  minItems: 3
                  description: Array of 3+ photo URLs
                  example:
                    - "https://cdn.com/return1.jpg"
                    - "https://cdn.com/return2.jpg"
                    - "https://cdn.com/return3.jpg"
                odometerReading:
                  type: integer
                  example: 109461
                notes:
                  type: string
                  example: "Returned in good condition"
      responses:
        '200':
          description: Return submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Return submitted"
                  bookingStatus:
                    type: string
                    example: "return_submitted"

  /bookings/{id}/cancel:
    post:
      summary: Cancel booking
      tags: [Customer]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  example: "Change of plans"
      responses:
        '200':
          description: Booking cancelled

  # ==================== OWNER ENDPOINTS ====================
  /bookings/owner/bookings:
    get:
      summary: Get owner's rental requests
      tags: [Owner]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, pending, booking, picked_up, return_submitted, completed]
        - name: vehicleId
          in: query
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List of rental requests

  /bookings/owner/{id}/accept:
    post:
      summary: Accept booking request
      tags: [Owner]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Booking accepted

  /bookings/owner/{id}/reject:
    post:
      summary: Reject booking request
      description: Owner must specify refund amount (typically full refund for owner rejection)
      tags: [Owner]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
                - refundAmount
              properties:
                reason:
                  type: string
                  example: "Vehicle not available"
                refundAmount:
                  type: number
                  description: Refund amount (cannot exceed deposit)
                  example: 255000
      responses:
        '200':
          description: Booking rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Booking rejected"
                  refundAmount:
                    type: number
                    example: 255000

  /bookings/owner/{id}/confirm-return:
    post:
      summary: Confirm vehicle return (complete or dispute)
      description: |
        Owner confirms return with 3+ photos and chooses action:
        - **complete**: No issues, booking completed
        - **dispute**: Issues found, opens dispute for customer support review
      tags: [Owner]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - conditionPhotos
                - damagesReported
                - odometerReading
                - action
              properties:
                conditionPhotos:
                  type: array
                  items:
                    type: string
                  minItems: 3
                  description: Array of 3+ photo URLs
                  example:
                    - "https://cdn.com/owner-return1.jpg"
                    - "https://cdn.com/owner-return2.jpg"
                    - "https://cdn.com/owner-return3.jpg"
                conditionNotes:
                  type: string
                  example: "Minor scratches on rear bumper"
                damagesReported:
                  type: boolean
                  example: false
                odometerReading:
                  type: integer
                  example: 109461
                action:
                  type: string
                  enum: [complete, dispute]
                  description: |
                    - complete: Booking completed, no issues
                    - dispute: Open dispute for CS review
                  example: "complete"
      responses:
        '200':
          description: Return confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Return confirmed, booking completed"
                  bookingStatus:
                    type: string
                    enum: [completed, dispute_opened]
                    example: "completed"

# ==================== COMPONENTS ====================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    VerificationStatus:
      type: object
      properties:
        isVerified:
          type: boolean
        hasLicense:
          type: boolean
        hasSelfies:
          type: boolean
        needsVerification:
          type: boolean

    VerificationUpload:
      type: object
      required:
        - fullName
        - licenseNumber
        - expiryDate
        - licenseFrontPhoto
        - licenseBackPhoto
        - frontSelfie
        - leftSelfie
        - rightSelfie
      properties:
        fullName:
          type: string
        licenseNumber:
          type: string
        expiryDate:
          type: string
          format: date
        licenseFrontPhoto:
          type: string
        licenseBackPhoto:
          type: string
        frontSelfie:
          type: string
        leftSelfie:
          type: string
        rightSelfie:
          type: string

    CreateBookingRequest:
      type: object
      required:
        - vehicleId
        - startDate
        - endDate
        - pickupLocation
        - dropoffLocation
        - insuranceCoverage
        - paymentMethodId
      properties:
        vehicleId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        pickupLocation:
          type: object
        dropoffLocation:
          type: object
        driverRequired:
          type: boolean
          default: false
        insuranceCoverage:
          type: integer
          minimum: 0
          maximum: 100
        paymentMethodId:
          type: string
        additionalNotes:
          type: string
openapi: 3.0.0
info:
  title: Wiz User Service API
  description: |
    Comprehensive user management service for the Wiz car rental platform.
    
    ## Features
    - User authentication (email/password, OAuth with Google/Facebook)
    - User management (filtering, searching, sorting)
    - Device management for push notifications
    - Payment methods CRUD
    - Analytics and statistics
    - License verification
    - Owner verification workflow
    
  version: 2.0.0
  contact:
    name: Wiz Development Team
    
servers:
  - url: http://localhost:3001
    description: Local development server
  - url: https://api.wiz.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication and OAuth
  - name: Users
    description: User management and profiles
  - name: Devices
    description: Device management for push notifications
  - name: Payments
    description: Payment methods management
  - name: Favorites
    description: User favorite vehicles
  - name: Location
    description: Location services
  - name: Analytics
    description: User statistics and analytics

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login or OAuth
      
  schemas:
    User:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [customer, owner, admin, support]
        status:
          type: string
          enum: [normal, active, suspended, banned, deleted]
        license_status:
          type: string
          enum: [unverified, pending, verified, rejected]
        owner_status:
          type: string
          enum: [unverified, verified, rejected]
          nullable: true
        is_verified:
          type: boolean
        avatar_url:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          
    UserWithStats:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            total_bookings_as_customer:
              type: integer
            completed_bookings_as_customer:
              type: integer
            total_rentals_as_owner:
              type: integer
            average_rating_as_customer:
              type: number
              format: float
            average_rating_as_owner:
              type: number
              format: float
            total_spent:
              type: number
              format: decimal
            total_earned:
              type: number
              format: decimal
              
    Device:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fcmToken:
          type: string
        platform:
          type: string
          enum: [android, ios, web]
        deviceName:
          type: string
        lastUsed:
          type: string
          format: date-time
          
    PaymentMethod:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [credit_card, debit_card, paypal, bank_account, wallet]
        provider:
          type: string
        card_last_four:
          type: string
        card_brand:
          type: string
        card_exp_month:
          type: integer
        card_exp_year:
          type: integer
        holder_name:
          type: string
        is_default:
          type: boolean
        is_verified:
          type: boolean
        status:
          type: string
          enum: [active, expired, invalid, deleted]
        created_at:
          type: string
          format: date-time
          
    Error:
      type: object
      properties:
        error:
          type: string
        field:
          type: string
          
    Pagination:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

paths:
  # ==================== AUTHENTICATION ====================
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - fullName
                - password
                - confirmPassword
              properties:
                email:
                  type: string
                  format: email
                fullName:
                  type: string
                password:
                  type: string
                  format: password
                  minLength: 8
                confirmPassword:
                  type: string
                  format: password
      responses:
        '201':
          description: User registered successfully, OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  userId:
                    type: string
                  otp:
                    type: string
                    description: Only in development mode
        '400':
          description: Validation error or user already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
                
  /auth/verify-email-otp:
    post:
      tags:
        - Authentication
      summary: Verify email with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - code
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  pattern: '^\d{6}$'
      responses:
        '200':
          description: Email verified, user logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Invalid or expired OTP
          
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
        '403':
          description: Email not verified
          
  /auth/google:
    get:
      tags:
        - Authentication
      summary: Initiate Google OAuth login
      description: Redirects user to Google login page
      responses:
        '302':
          description: Redirect to Google
          
  /auth/google/callback:
    get:
      tags:
        - Authentication
      summary: Google OAuth callback
      description: Handles Google OAuth callback and redirects to frontend
      responses:
        '302':
          description: Redirect to frontend with tokens
          
  /auth/facebook:
    get:
      tags:
        - Authentication
      summary: Initiate Facebook OAuth login
      responses:
        '302':
          description: Redirect to Facebook
          
  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out successfully
          
  /auth/refresh-token:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  newToken:
                    type: string
                    
  # ==================== USER MANAGEMENT ====================
  /users:
    get:
      tags:
        - Users
      summary: Get all users with filtering and sorting
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          description: Search by name, email, or ID
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
            enum: [customer, owner]
        - name: status
          in: query
          schema:
            type: string
            enum: [normal, active, suspended, banned]
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [full_name, created_at, email, role, status]
            default: created_at
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
        - name: includeAdmin
          in: query
          schema:
            type: string
            enum: ['true', 'false']
            default: 'false'
        - name: includeSupport
          in: query
          schema:
            type: string
            enum: ['true', 'false']
            default: 'false'
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserWithStats'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                    
  /users/support:
    get:
      tags:
        - Users
      summary: Get all support users
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of support users
          
  /users/owners:
    get:
      tags:
        - Users
      summary: Get all owner users
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of owner users
          
  /users/customers:
    get:
      tags:
        - Users
      summary: Get all customer users
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of customer users
          
  /users/{userId}:
    get:
      tags:
        - Users
      summary: Get user by ID
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserWithStats'
        '404':
          description: User not found
          
  /users/{userId}/role:
    put:
      tags:
        - Users
      summary: Change user role (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newRole
              properties:
                newRole:
                  type: string
                  enum: [customer, owner]
      responses:
        '200':
          description: Role updated
        '403':
          description: Admin access required
          
  /users/{userId}/status:
    put:
      tags:
        - Users
      summary: Update user status (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [normal, active, suspended, banned]
                reason:
                  type: string
      responses:
        '200':
          description: Status updated
          
  /users/{userId}/license-status:
    get:
      tags:
        - Users
      summary: Get user license verification status
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: License status
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                  email:
                    type: string
                  licenseStatus:
                    type: string
                    enum: [unverified, pending, verified, rejected]
                  hasLicense:
                    type: boolean
                    
  /users/{userId}/upload-license:
    post:
      tags:
        - Users
      summary: Upload driver's license
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - licenseUrl
              properties:
                licenseUrl:
                  type: string
                  description: URL to uploaded license image
      responses:
        '200':
          description: License uploaded
          
  # ==================== DEVICES ====================
  /devices:
    post:
      tags:
        - Devices
      summary: Register device for push notifications
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fcmToken
                - platform
              properties:
                fcmToken:
                  type: string
                platform:
                  type: string
                  enum: [android, ios, web]
                deviceName:
                  type: string
                appVersion:
                  type: string
                osVersion:
                  type: string
      responses:
        '201':
          description: Device registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  device:
                    $ref: '#/components/schemas/Device'
        '409':
          description: Device already registered
          
    get:
      tags:
        - Devices
      summary: Get current user's devices
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Device'
                      
  /devices/{deviceId}:
    delete:
      tags:
        - Devices
      summary: Delete device
      security:
        - BearerAuth: []
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Device deleted
          
  /api/users/{userId}/devices:
    get:
      tags:
        - Devices
      summary: Get user devices (for notification service)
      description: Public API for internal microservice communication
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  devices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Device'
                      
  # ==================== PAYMENT METHODS ====================
  /payments/methods:
    get:
      tags:
        - Payments
      summary: Get all payment methods for current user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of payment methods
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentMethods:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
                      
    post:
      tags:
        - Payments
      summary: Add new payment method
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum: [credit_card, debit_card, paypal, bank_account, wallet]
                provider:
                  type: string
                providerPaymentMethodId:
                  type: string
                cardLastFour:
                  type: string
                cardBrand:
                  type: string
                cardExpMonth:
                  type: integer
                cardExpYear:
                  type: integer
                holderName:
                  type: string
                billingAddress:
                  type: object
                isDefault:
                  type: boolean
      responses:
        '201':
          description: Payment method added
          
  /payments/methods/{methodId}:
    get:
      tags:
        - Payments
      summary: Get payment method by ID
      security:
        - BearerAuth: []
      parameters:
        - name: methodId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment method details
          
    put:
      tags:
        - Payments
      summary: Update payment method
      security:
        - BearerAuth: []
      parameters:
        - name: methodId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cardExpMonth:
                  type: integer
                cardExpYear:
                  type: integer
                holderName:
                  type: string
                billingAddress:
                  type: object
                isDefault:
                  type: boolean
      responses:
        '200':
          description: Payment method updated
          
    delete:
      tags:
        - Payments
      summary: Delete payment method
      security:
        - BearerAuth: []
      parameters:
        - name: methodId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment method deleted
          
  /payments/methods/{methodId}/set-default:
    put:
      tags:
        - Payments
      summary: Set payment method as default
      security:
        - BearerAuth: []
      parameters:
        - name: methodId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Default payment method updated
          
  # ==================== FAVORITES ====================
  /favorites:
    get:
      tags:
        - Favorites
      summary: Get user's favorite vehicles
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of favorites
          
    post:
      tags:
        - Favorites
      summary: Add vehicle to favorites
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vehicleId
              properties:
                vehicleId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Vehicle added to favorites
          
  /favorites/{vehicleId}:
    delete:
      tags:
        - Favorites
      summary: Remove vehicle from favorites
      security:
        - BearerAuth: []
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vehicle removed from favorites
          
  # ==================== ANALYTICS ====================
  /analytics/users/stats:
    get:
      tags:
        - Analytics
      summary: Get user statistics
      security:
        - BearerAuth: []
      parameters:
        - name: timeRange
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d, 1y]
            default: 30d
      responses:
        '200':
          description: User statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  active:
                    type: integer
                  newUsers:
                    type: integer
                  renters:
                    type: integer
                  owners:
                    type: integer
                  growth:
                    type: number
                  byType:
                    type: object
                  byStatus:
                    type: object
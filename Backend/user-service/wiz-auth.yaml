openapi: 3.0.0
info:
  title: Wiz API
  description: Mock APIs for Wiz app.
  version: 1.0.0
servers:
  - url: http://localhost:3001
    description: Real server
paths:
  /auth/register:
    post:
      summary: Register new user + send OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email, example: "user@wiz.com" }
                fullName: { type: string, example: "John Doe" }
                password: { type: string, format: password, example: "SecurePass123!" }
                confirm-password: { type: string, format: password, example: "SecurePass123!" }
      responses:
        '201':
          description: User created, OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "OTP sent to email" }
                  userId: { type: string, example: "uuid-123" }
  /auth/verify-email-otp:
    post:
      summary: Verify signup OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email, example: "user@wiz.com" }
                code: { type: string, pattern: '^\d{6}$', example: "123456" }
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, example: "eyJhbGciOiJIUzI1NiIs..." }
                  user: { $ref: '#/components/schemas/User' }
  /auth/login:
    post:
      summary: Email/password login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, example: "eyJhbGciOiJIUzI1NiIs..." }
                  user: { $ref: '#/components/schemas/User' }
  /auth/forgot-password:
    post:
      summary: Send reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Reset code sent" }
  /auth/verify-reset-otp:
    post:
      summary: Verify reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                code: { type: string, pattern: '^\d{6}$', example: "654321" }
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Verified - proceed to reset" }
  /auth/reset-password:
    post:
      summary: Reset password after OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newPassword: { type: string, format: password, example: "NewSecurePass123!" }
                confirmNewPassword: { type: string, format: password, example: "NewSecurePass123!" }

      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Password updated" }
  /auth/refresh-token:
    post:
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string, example: "eyJhbGciOiJIUzI1NiIs..." }
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  newToken: { type: string, example: "eyJhbGciOiJIUzI1NiIs..." }
  /auth/logout:
    post:
      summary: Logout (invalidate token)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Session ended" }
  /auth/social-login:
    post:
      summary: Social login (Google/FB)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider: { type: string, enum: [google, facebook], example: "google" }
                idToken: { type: string, example: "google-id-token" }
      responses:
        '200':
          description: Social login success
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, example: "eyJhbGciOiJIUzI1NiIs..." }
                  user: { $ref: '#/components/schemas/User' }
components:
  schemas:
    User:
      type: object
      properties:
        id: { type: string, example: "uuid-123" }
        email: { type: string, format: email, example: "user@wiz.com" }
        fullName: { type: string, example: "John Doe" }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
// Backend/review-service/proto/vehicle.proto
syntax = "proto3";

package vehicle;

service VehicleService {
  // Get vehicle basic info
  rpc GetVehicleInfo(GetVehicleInfoRequest) returns (GetVehicleInfoResponse);
  
  // Update vehicle rating after review
  rpc UpdateVehicleRating(UpdateVehicleRatingRequest) returns (UpdateVehicleRatingResponse);
}

message GetVehicleInfoRequest {
  string vehicle_id = 1;
}

message GetVehicleInfoResponse {
  string vehicle_id = 1;
  string owner_id = 2;
  string name = 3;
  string vehicle_type = 4;
  int32 price_per_day = 5;
  string status = 6;
  double average_rating = 7;
  int32 total_rentals = 8;
}

message UpdateVehicleRatingRequest {
  string vehicle_id = 1;
  double new_rating = 2;
  int32 new_review_count = 3;
}

message UpdateVehicleRatingResponse {
  bool success = 1;
  string message = 2;
  double updated_rating = 3;
}